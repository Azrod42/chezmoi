name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: cealum-linux-x64
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: cealum-macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build -p cealum-cli --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          tar -czf "dist/${{ matrix.artifact }}.tar.gz" -C "target/${{ matrix.target }}/release" cealum

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
